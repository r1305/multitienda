<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#ff5722">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Multitienda</title>
  <link rel="stylesheet" href="/app/css/app.css">
  <link rel="stylesheet" href="/app/css/store-owner.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="/assets/img/favicons/favicon-96x96.png">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('appTheme') || 'light');</script>
  <script>
    // Unregister stale service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => {
          if (r.active && r.active.scriptURL && !r.active.scriptURL.includes(location.origin)) r.unregister();
        });
      });
    }
  </script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer async></script>
</head>
<body>
  <div id="app">
    <router-view></router-view>
    <tab-bar v-if="showTabBar"></tab-bar>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="/app/js/api.js"></script>
  <script src="/app/js/store.js"></script>
  <script src="/app/js/components.js"></script>
  <script src="/app/js/pages.js"></script>
  <script src="/app/js/delivery.js"></script>
  <script>document.write('<scr'+'ipt src="/app/js/store-owner.js?t='+Date.now()+'"></scr'+'ipt>')</script>
  <script src="/app/js/app.js"></script>
</body>
</html>
